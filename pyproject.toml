[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "jobscout.settings_test"
pythonpath = ["."]
testpaths = ["core/tests"]
addopts = "--cov --cov-fail-under=100 --cov-report=term-missing"

[tool.coverage.run]
source = ["core", "jobscout"]
omit = [
    "*/migrations/*",
    "*/tests/*",
    "manage.py",
    "jobscout/wsgi.py",
    "jobscout/asgi.py",
    "jobscout/settings_test.py",
]

[tool.coverage.report]
show_missing = true
