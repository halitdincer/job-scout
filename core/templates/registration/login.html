{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign In | Job Scout</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'core/style.css' %}">
</head>
<body>
  <main class="auth-shell">
    <section class="auth-card">
      <div class="auth-brand">Job Scout</div>
      <h1>Sign in</h1>
      {% if form.errors %}
        <div class="auth-error">Please enter a correct username and password.</div>
      {% endif %}
      <form method="post" novalidate>
        {% csrf_token %}
        <div class="auth-field">
          <label for="id_username">Username</label>
          <input id="id_username" name="username" type="text" autocomplete="username" required autofocus>
        </div>
        <div class="auth-field">
          <label for="id_password">Password</label>
          <input id="id_password" name="password" type="password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="auth-submit">Sign in</button>
      </form>
    </section>
  </main>
</body>
</html>
