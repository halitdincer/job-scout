{% extends "core/base.html" %}

{% block title %}Jobs — Job Scout{% endblock %}

{% block main_attrs %} class="full-bleed"{% endblock %}

{% block content %}
<div class="jobs-toolbar">
  <div class="col-chooser-wrap">
    <button class="col-chooser-btn" id="col-chooser-btn">Columns</button>
    <div class="col-chooser-panel" id="col-chooser-panel"></div>
  </div>
</div>
<div id="jobs-grid"></div>

<script>
(function() {
  var EMPLOYMENT_LABELS = {
    full_time: "Full-time",
    part_time: "Part-time",
    contract: "Contract",
    intern: "Intern",
    temporary: "Temporary",
    unknown: "Unknown"
  };

  var WORKPLACE_LABELS = {
    on_site: "On-site",
    remote: "Remote",
    hybrid: "Hybrid",
    unknown: "Unknown"
  };

  function formatDateTime(iso) {
    if (!iso) return "—";
    var d = new Date(iso);
    return d.toLocaleString("en-US", {
      month: "short", day: "numeric", year: "numeric",
      hour: "numeric", minute: "2-digit"
    });
  }

  function timeAgo(iso) {
    if (!iso) return "—";
    var now = Date.now();
    var then = new Date(iso).getTime();
    var diff = Math.floor((now - then) / 1000);
    if (diff < 0) return "just now";
    if (diff < 60) return diff + "s ago";
    var mins = Math.floor(diff / 60);
    if (mins < 60) return mins + "m ago";
    var hours = Math.floor(mins / 60);
    if (hours < 24) return hours + "h ago";
    var days = Math.floor(hours / 24);
    if (days < 30) return days + "d ago";
    var months = Math.floor(days / 30);
    if (months < 12) return months + "mo ago";
    var years = Math.floor(months / 12);
    return years + "y ago";
  }

  function timeAgoCellRenderer(params) {
    if (!params.value) return "—";
    var span = document.createElement("span");
    span.textContent = timeAgo(params.value);
    span.title = formatDateTime(params.value);
    return span;
  }

  var theme = agGrid.themeQuartz.withPart(agGrid.colorSchemeDarkBlue);

  var gridOptions = {
    theme: theme,
    columnDefs: [
      {
        field: "title",
        headerName: "Title",
        filter: "agTextColumnFilter",
        cellRenderer: function(params) {
          if (!params.value) return "";
          var a = document.createElement("a");
          a.href = params.data.url;
          a.target = "_blank";
          a.rel = "noopener";
          a.textContent = params.value;
          return a;
        },
        minWidth: 250,
        flex: 2
      },
      {
        field: "source_name",
        headerName: "Company",
        filter: "agSetColumnFilter",
        minWidth: 120,
        flex: 1
      },
      {
        field: "department",
        headerName: "Department",
        filter: "agTextColumnFilter",
        minWidth: 120,
        flex: 1
      },
      {
        field: "locations_display",
        headerName: "Locations",
        filter: "agTextColumnFilter",
        minWidth: 150,
        flex: 1
      },
      {
        field: "employment_type_label",
        headerName: "Type",
        filter: "agSetColumnFilter",
        filterValueGetter: function(params) {
          return params.data.employment_type_label;
        },
        minWidth: 100
      },
      {
        field: "workplace_type_label",
        headerName: "Workplace",
        filter: "agSetColumnFilter",
        filterValueGetter: function(params) {
          return params.data.workplace_type_label;
        },
        minWidth: 100
      },
      {
        field: "country",
        headerName: "Country",
        filter: "agSetColumnFilter",
        minWidth: 80
      },
      {
        field: "status",
        headerName: "Status",
        filter: "agSetColumnFilter",
        minWidth: 90
      },
      {
        field: "first_seen_at",
        headerName: "First Seen",
        filter: "agDateColumnFilter",
        cellRenderer: timeAgoCellRenderer,
        sort: "desc",
        minWidth: 120
      },
      {
        field: "last_seen_at",
        headerName: "Last Seen",
        filter: "agDateColumnFilter",
        cellRenderer: timeAgoCellRenderer,
        minWidth: 120
      },
      {
        field: "team",
        headerName: "Team",
        filter: "agTextColumnFilter",
        minWidth: 120,
        hide: true
      },
      {
        field: "published_at",
        headerName: "Published At",
        filter: "agDateColumnFilter",
        valueFormatter: function(params) { return formatDateTime(params.value); },
        minWidth: 160,
        hide: true
      },
      {
        field: "updated_at_source",
        headerName: "Updated At Source",
        filter: "agDateColumnFilter",
        valueFormatter: function(params) { return formatDateTime(params.value); },
        minWidth: 160,
        hide: true
      },
      {
        field: "expired_at",
        headerName: "Expired At",
        filter: "agDateColumnFilter",
        valueFormatter: function(params) { return formatDateTime(params.value); },
        minWidth: 160,
        hide: true
      },
      {
        field: "external_id",
        headerName: "External ID",
        filter: "agTextColumnFilter",
        minWidth: 120,
        hide: true
      },
      {
        field: "source_id",
        headerName: "Source ID",
        filter: "agNumberColumnFilter",
        minWidth: 100,
        hide: true
      },
      {
        field: "id",
        headerName: "ID",
        filter: "agNumberColumnFilter",
        minWidth: 80,
        hide: true
      }
    ],
    defaultColDef: {
      sortable: true,
      resizable: true,
      filterParams: { buttons: ["reset"] }
    },
    pagination: true,
    paginationPageSize: 50,
    paginationPageSizeSelector: [25, 50, 100],
    rowData: [],
    autoSizeStrategy: { type: "fitGridWidth" },
    suppressCellFocus: true
  };

  var gridDiv = document.getElementById("jobs-grid");
  var gridApi = agGrid.createGrid(gridDiv, gridOptions);

  // Column chooser
  var chooserBtn = document.getElementById("col-chooser-btn");
  var chooserPanel = document.getElementById("col-chooser-panel");

  function buildChooser() {
    chooserPanel.innerHTML = "";
    gridApi.getColumns().forEach(function(col) {
      var colDef = col.getColDef();
      var label = document.createElement("label");
      var cb = document.createElement("input");
      cb.type = "checkbox";
      cb.checked = col.isVisible();
      cb.addEventListener("change", function() {
        gridApi.setColumnsVisible([col.getColId()], cb.checked);
      });
      label.appendChild(cb);
      label.appendChild(document.createTextNode(colDef.headerName || col.getColId()));
      chooserPanel.appendChild(label);
    });
  }

  chooserBtn.addEventListener("click", function(e) {
    e.stopPropagation();
    var isOpen = chooserPanel.classList.toggle("open");
    if (isOpen) buildChooser();
  });

  document.addEventListener("click", function(e) {
    if (!chooserPanel.contains(e.target) && e.target !== chooserBtn) {
      chooserPanel.classList.remove("open");
    }
  });

  fetch("/api/jobs/")
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var rows = data.map(function(item) {
        var locs = item.locations || [];
        item.locations_display = locs.map(function(l) { return l.name; }).join(", ") || "—";
        item.employment_type_label = EMPLOYMENT_LABELS[item.employment_type] || item.employment_type || "—";
        item.workplace_type_label = WORKPLACE_LABELS[item.workplace_type] || item.workplace_type || "—";
        item.department = item.department || "—";
        item.country = item.country || "—";
        item.team = item.team || "—";
        return item;
      });
      gridApi.setGridOption("rowData", rows);
    });
})();
</script>
{% endblock %}
