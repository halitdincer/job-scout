{% extends "core/base.html" %}

{% block title %}Jobs — Job Scout{% endblock %}

{% block content %}
<h1>Job Listings</h1>
<div id="jobs-grid"></div>

<script>
(function() {
  var EMPLOYMENT_LABELS = {
    full_time: "Full-time",
    part_time: "Part-time",
    contract: "Contract",
    intern: "Intern",
    temporary: "Temporary",
    unknown: "Unknown"
  };

  var WORKPLACE_LABELS = {
    on_site: "On-site",
    remote: "Remote",
    hybrid: "Hybrid",
    unknown: "Unknown"
  };

  function formatDate(iso) {
    if (!iso) return "—";
    var d = new Date(iso);
    return d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
  }

  var theme = agGrid.themeQuartz.withPart(agGrid.colorSchemeDarkBlue);

  var gridOptions = {
    theme: theme,
    columnDefs: [
      {
        field: "title",
        headerName: "Title",
        filter: "agTextColumnFilter",
        cellRenderer: function(params) {
          if (!params.value) return "";
          var a = document.createElement("a");
          a.href = params.data.url;
          a.target = "_blank";
          a.rel = "noopener";
          a.textContent = params.value;
          return a;
        },
        minWidth: 250,
        flex: 2
      },
      {
        field: "source_name",
        headerName: "Company",
        filter: "agSetColumnFilter",
        minWidth: 120,
        flex: 1
      },
      {
        field: "department",
        headerName: "Department",
        filter: "agTextColumnFilter",
        minWidth: 120,
        flex: 1
      },
      {
        field: "locations_display",
        headerName: "Locations",
        filter: "agTextColumnFilter",
        minWidth: 150,
        flex: 1
      },
      {
        field: "employment_type_label",
        headerName: "Type",
        filter: "agSetColumnFilter",
        minWidth: 100
      },
      {
        field: "workplace_type_label",
        headerName: "Workplace",
        filter: "agSetColumnFilter",
        minWidth: 100
      },
      {
        field: "country",
        headerName: "Country",
        filter: "agSetColumnFilter",
        minWidth: 80
      },
      {
        field: "status",
        headerName: "Status",
        filter: "agSetColumnFilter",
        minWidth: 90
      },
      {
        field: "first_seen_at",
        headerName: "First Seen",
        filter: "agDateColumnFilter",
        valueFormatter: function(params) { return formatDate(params.value); },
        sort: "desc",
        minWidth: 120
      }
    ],
    defaultColDef: {
      sortable: true,
      resizable: true,
      filterParams: { buttons: ["reset"] }
    },
    pagination: true,
    paginationPageSize: 50,
    paginationPageSizeSelector: [25, 50, 100],
    rowData: [],
    autoSizeStrategy: { type: "fitGridWidth" },
    suppressCellFocus: true
  };

  var gridDiv = document.getElementById("jobs-grid");
  var gridApi = agGrid.createGrid(gridDiv, gridOptions);

  fetch("/api/jobs/")
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var rows = data.map(function(item) {
        item.locations_display = (item.locations || []).join(", ") || "—";
        item.employment_type_label = EMPLOYMENT_LABELS[item.employment_type] || item.employment_type || "—";
        item.workplace_type_label = WORKPLACE_LABELS[item.workplace_type] || item.workplace_type || "—";
        item.department = item.department || "—";
        item.country = item.country || "—";
        return item;
      });
      gridApi.setGridOption("rowData", rows);
    });
})();
</script>
{% endblock %}
