{% extends "core/base.html" %}

{% block title %}Jobs — Job Scout{% endblock %}

{% block main_attrs %} class="full-bleed"{% endblock %}

{% block content %}
<div class="jobs-toolbar">
  <div class="col-chooser-wrap">
    <button class="col-chooser-btn" id="col-chooser-btn">Columns</button>
    <div class="col-chooser-panel" id="col-chooser-panel"></div>
  </div>
</div>
<div id="jobs-grid"></div>

<script>
(function() {
  var EMPLOYMENT_LABELS = {
    full_time: "Full-time",
    part_time: "Part-time",
    contract: "Contract",
    intern: "Intern",
    temporary: "Temporary",
    unknown: "Unknown"
  };

  var WORKPLACE_LABELS = {
    on_site: "On-site",
    remote: "Remote",
    hybrid: "Hybrid",
    unknown: "Unknown"
  };

  function formatDateTime(iso) {
    if (!iso) return "";
    var d = new Date(iso);
    return d.toLocaleString("en-US", {
      month: "short", day: "numeric", year: "numeric",
      hour: "numeric", minute: "2-digit"
    });
  }

  function timeAgo(iso) {
    if (!iso) return "";
    var now = Date.now();
    var then = new Date(iso).getTime();
    var diff = Math.floor((now - then) / 1000);
    if (diff < 0) return "just now";
    if (diff < 60) return diff + "s ago";
    var mins = Math.floor(diff / 60);
    if (mins < 60) return mins + "m ago";
    var hours = Math.floor(mins / 60);
    if (hours < 24) return hours + "h ago";
    var days = Math.floor(hours / 24);
    if (days < 30) return days + "d ago";
    var months = Math.floor(days / 30);
    if (months < 12) return months + "mo ago";
    var years = Math.floor(months / 12);
    return years + "y ago";
  }

  function timeAgoFormatter(cell) {
    var val = cell.getValue();
    if (!val) return "";
    return timeAgo(val);
  }

  function timeAgoTooltip(e, cell) {
    return formatDateTime(cell.getValue());
  }

  function titleFormatter(cell) {
    var val = cell.getValue();
    if (!val) return "";
    var row = cell.getRow().getData();
    return '<a href="' + row.url + '" target="_blank" rel="noopener">' + val.replace(/</g, "&lt;") + '</a>';
  }

  function isoDateSorter(a, b) {
    if (!a && !b) return 0;
    if (!a) return 1;
    if (!b) return -1;
    if (a < b) return -1;
    if (a > b) return 1;
    return 0;
  }

  var DATE_RANGE_PRESETS = [
    { label: "Today", value: "0" },
    { label: "Last 7 days", value: "7" },
    { label: "Last 14 days", value: "14" },
    { label: "Last 30 days", value: "30" },
    { label: "Last 90 days", value: "90" }
  ];

  function dateRangeFilter(headerValue, rowValue) {
    if (!headerValue) return true;
    if (!rowValue) return false;
    var days = parseInt(headerValue, 10);
    var rowTime = new Date(rowValue).getTime();
    if (isNaN(rowTime)) return false;
    if (days === 0) {
      var today = new Date().toISOString().slice(0, 10);
      return rowValue.slice(0, 10) === today;
    }
    var cutoff = Date.now() - days * 24 * 60 * 60 * 1000;
    return rowTime >= cutoff;
  }

  var dateFilterParams = { values: DATE_RANGE_PRESETS, clearable: true };

  var listFilterParams = { valuesLookup: true, clearable: true, sort: "asc" };

  function arrayJoinFormatter(cell) {
    var val = cell.getValue();
    if (!val || !Array.isArray(val)) return "";
    return val.join(", ");
  }

  function arrayContainsFilter(headerValue, rowValue) {
    if (!headerValue) return true;
    if (!rowValue || !Array.isArray(rowValue)) return false;
    return rowValue.indexOf(headerValue) !== -1;
  }

  function arrayValuesLookup(cell) {
    var field = cell.getField();
    var seen = {};
    var values = [];
    cell.getTable().getData().forEach(function(row) {
      var arr = row[field];
      if (arr && Array.isArray(arr)) {
        arr.forEach(function(v) {
          if (v && !seen[v]) {
            seen[v] = true;
            values.push(v);
          }
        });
      }
    });
    values.sort();
    return values;
  }

  var arrayFilterParams = { valuesLookup: arrayValuesLookup, clearable: true, sort: "asc" };

  var table = new Tabulator("#jobs-grid", {
    height: "100%",
    layout: "fitColumns",
    pagination: true,
    paginationSize: 50,
    paginationSizeSelector: [25, 50, 100],
    placeholder: "No jobs found",
    columns: [
      {
        title: "Title", field: "title",
        headerFilter: "input", headerFilterPlaceholder: "Search...",
        formatter: titleFormatter, formatterParams: { allowHtml: true },
        minWidth: 250, widthGrow: 3
      },
      {
        title: "Company", field: "source_name",
        headerFilter: "list", headerFilterParams: listFilterParams,
        minWidth: 120, widthGrow: 1
      },
      {
        title: "Location (Raw)", field: "locations_display",
        headerFilter: "input", headerFilterPlaceholder: "Search...",
        minWidth: 150, widthGrow: 1, visible: false
      },
      {
        title: "Type", field: "employment_type_label",
        headerFilter: "list", headerFilterParams: listFilterParams,
        minWidth: 100, visible: false
      },
      {
        title: "Published At", field: "published_at",
        formatter: timeAgoFormatter, tooltip: timeAgoTooltip,
        sorter: isoDateSorter,
        headerFilter: "list", headerFilterParams: dateFilterParams,
        headerFilterFunc: dateRangeFilter,
        minWidth: 120
      },
      {
        title: "First Seen", field: "first_seen_at",
        formatter: timeAgoFormatter, tooltip: timeAgoTooltip,
        sorter: isoDateSorter,
        headerFilter: "list", headerFilterParams: dateFilterParams,
        headerFilterFunc: dateRangeFilter,
        minWidth: 120
      },
      {
        title: "Department", field: "department",
        headerFilter: "input", headerFilterPlaceholder: "Search...",
        minWidth: 120, visible: false
      },
      {
        title: "Workplace", field: "workplace_type_label",
        headerFilter: "list", headerFilterParams: listFilterParams,
        minWidth: 100, visible: false
      },
      {
        title: "Country", field: "country",
        formatter: arrayJoinFormatter,
        headerFilter: "list", headerFilterParams: arrayFilterParams,
        headerFilterFunc: arrayContainsFilter,
        minWidth: 80
      },
      {
        title: "Region", field: "region",
        formatter: arrayJoinFormatter,
        headerFilter: "list", headerFilterParams: arrayFilterParams,
        headerFilterFunc: arrayContainsFilter,
        minWidth: 100, visible: false
      },
      {
        title: "City", field: "city",
        formatter: arrayJoinFormatter,
        headerFilter: "list", headerFilterParams: arrayFilterParams,
        headerFilterFunc: arrayContainsFilter,
        minWidth: 100
      },
      {
        title: "Status", field: "status",
        headerFilter: "list", headerFilterParams: listFilterParams,
        minWidth: 90, visible: false
      },
      {
        title: "Last Seen", field: "last_seen_at",
        formatter: timeAgoFormatter, tooltip: timeAgoTooltip,
        sorter: isoDateSorter,
        headerFilter: "list", headerFilterParams: dateFilterParams,
        headerFilterFunc: dateRangeFilter,
        minWidth: 120, visible: false
      },
      {
        title: "Team", field: "team",
        headerFilter: "input", headerFilterPlaceholder: "Search...",
        minWidth: 120, visible: false
      },
      {
        title: "Updated At Source", field: "updated_at_source",
        formatter: timeAgoFormatter, tooltip: timeAgoTooltip,
        sorter: isoDateSorter,
        headerFilter: "list", headerFilterParams: dateFilterParams,
        headerFilterFunc: dateRangeFilter,
        minWidth: 120, visible: false
      },
      {
        title: "Expired At", field: "expired_at",
        formatter: timeAgoFormatter, tooltip: timeAgoTooltip,
        sorter: isoDateSorter,
        headerFilter: "list", headerFilterParams: dateFilterParams,
        headerFilterFunc: dateRangeFilter,
        minWidth: 120, visible: false
      },
      {
        title: "External ID", field: "external_id",
        headerFilter: "input",
        minWidth: 120, visible: false
      },
      {
        title: "Source ID", field: "source_id",
        minWidth: 100, visible: false
      },
      {
        title: "ID", field: "id",
        minWidth: 80, visible: false
      }
    ],
    initialSort: [{ column: "first_seen_at", dir: "desc" }]
  });

  // Column chooser
  var chooserBtn = document.getElementById("col-chooser-btn");
  var chooserPanel = document.getElementById("col-chooser-panel");

  function buildChooser() {
    chooserPanel.innerHTML = "";
    table.getColumns().forEach(function(col) {
      var def = col.getDefinition();
      var label = document.createElement("label");
      var cb = document.createElement("input");
      cb.type = "checkbox";
      cb.checked = col.isVisible();
      cb.addEventListener("change", function() {
        col.toggle();
      });
      label.appendChild(cb);
      label.appendChild(document.createTextNode(def.title || def.field));
      chooserPanel.appendChild(label);
    });
  }

  chooserBtn.addEventListener("click", function(e) {
    e.stopPropagation();
    var isOpen = chooserPanel.classList.toggle("open");
    if (isOpen) buildChooser();
  });

  document.addEventListener("click", function(e) {
    if (!chooserPanel.contains(e.target) && e.target !== chooserBtn) {
      chooserPanel.classList.remove("open");
    }
  });

  fetch("/api/jobs/")
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var rows = data.map(function(item) {
        var locs = item.locations || [];
        item.locations_display = locs.map(function(l) { return l.name; }).join(", ") || "";
        item.employment_type_label = EMPLOYMENT_LABELS[item.employment_type] || item.employment_type || "";
        item.workplace_type_label = WORKPLACE_LABELS[item.workplace_type] || item.workplace_type || "";
        item.department = item.department || "";
        item.country = item.country || [];
        item.region = item.region || [];
        item.city = item.city || [];
        item.team = item.team || "";
        return item;
      });
      table.setData(rows);
    });
})();
</script>
{% endblock %}
