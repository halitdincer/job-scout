{% extends "core/base.html" %}

{% block title %}Jobs - Job Scout{% endblock %}

{% block main_attrs %} class="full-bleed"{% endblock %}

{% block content %}
<div class="jobs-toolbar">
  <div class="jobs-toolbar-left">
    <button class="col-chooser-btn" id="open-columns-panel">Columns</button>
    <button class="col-chooser-btn" id="open-filters-panel">Filters</button>
    <button class="col-chooser-btn" id="reset-columns">Reset Columns</button>
  </div>
  <div id="advanced-filter-summary" class="filter-summary">No filters applied</div>
</div>

<div id="jobs-grid"></div>

<div id="panel-backdrop" class="panel-backdrop"></div>

<aside id="columns-side-panel" class="side-panel" aria-hidden="true">
  <div class="side-panel-header">
    <h2>Columns</h2>
    <button type="button" class="panel-close" data-close-panel="columns-side-panel">x</button>
  </div>
  <p class="side-panel-subtitle">Show or hide columns.</p>
  <div id="columns-panel-list" class="columns-panel-list"></div>
</aside>

<aside id="filters-panel" class="side-panel" aria-hidden="true">
  <div class="side-panel-header">
    <h2>Filters</h2>
    <button type="button" class="panel-close" data-close-panel="filters-panel">x</button>
  </div>
  <p class="side-panel-subtitle">Per-column filter rules. All rules combine with AND.</p>

  <div id="column-filter-sections" class="column-filter-sections"></div>

  <div class="filter-panel-actions">
    <button type="button" id="clear-all-filters" class="col-chooser-btn">Clear All</button>
    <button type="button" id="apply-filters" class="panel-primary-btn">Apply</button>
  </div>
</aside>

<div id="col-filter-popover" class="col-filter-popover" style="display:none;"></div>

<script>
(function() {
  var EMPLOYMENT_LABELS = {
    full_time: "Full-time",
    part_time: "Part-time",
    contract: "Contract",
    intern: "Intern",
    temporary: "Temporary",
    unknown: "Unknown"
  };
  var WORKPLACE_LABELS = {
    on_site: "On-site",
    remote: "Remote",
    hybrid: "Hybrid",
    unknown: "Unknown"
  };

  var FILTER_FIELD_DEFS = {
    title: { label: "Title", type: "text", operators: ["contains", "not_contains", "eq", "neq", "is_empty", "is_not_empty"], headerField: null },
    source_name: { label: "Company", type: "text", operators: ["contains", "eq", "neq", "is_empty", "is_not_empty"], headerField: "source_name" },
    status: { label: "Status", type: "enum", operators: ["eq", "neq", "in", "not_in"], headerField: "status" },
    department: { label: "Department", type: "text", operators: ["contains", "not_contains", "eq", "neq", "is_empty", "is_not_empty"], headerField: null },
    team: { label: "Team", type: "text", operators: ["contains", "not_contains", "eq", "neq", "is_empty", "is_not_empty"], headerField: null },
    employment_type: { label: "Type", type: "enum", operators: ["eq", "neq", "in", "not_in"], headerField: "employment_type_label" },
    workplace_type: { label: "Workplace", type: "enum", operators: ["eq", "neq", "in", "not_in"], headerField: "workplace_type_label" },
    country: { label: "Country", type: "array", operators: ["eq", "neq", "in", "not_in", "is_empty", "is_not_empty"], headerField: "country" },
    region: { label: "Region", type: "array", operators: ["eq", "neq", "in", "not_in", "is_empty", "is_not_empty"], headerField: "region" },
    city: { label: "City", type: "array", operators: ["contains", "not_contains", "eq", "neq", "in", "not_in", "is_empty", "is_not_empty"], headerField: "city" },
    published_at: { label: "Published At", type: "date", operators: ["before", "after", "in_last_days", "is_empty", "is_not_empty"], headerField: "published_at" },
    first_seen_at: { label: "First Seen", type: "date", operators: ["before", "after", "in_last_days", "is_empty", "is_not_empty"], headerField: "first_seen_at" },
    last_seen_at: { label: "Last Seen", type: "date", operators: ["before", "after", "in_last_days", "is_empty", "is_not_empty"], headerField: "last_seen_at" },
    updated_at_source: { label: "Updated At Source", type: "date", operators: ["before", "after", "in_last_days", "is_empty", "is_not_empty"], headerField: "updated_at_source" },
    expired_at: { label: "Expired At", type: "date", operators: ["before", "after", "in_last_days", "is_empty", "is_not_empty"], headerField: "expired_at" }
  };
  var FIELD_ORDER = Object.keys(FILTER_FIELD_DEFS);
  var OPERATOR_LABELS = {
    contains: "contains",
    not_contains: "does not contain",
    eq: "equals",
    neq: "does not equal",
    in: "is any of",
    not_in: "is none of",
    is_empty: "is empty",
    is_not_empty: "is not empty",
    before: "before",
    after: "after",
    in_last_days: "in last N days"
  };

  function formatDateTime(iso) {
    if (!iso) return "";
    var d = new Date(iso);
    return d.toLocaleString("en-US", { month: "short", day: "numeric", year: "numeric", hour: "numeric", minute: "2-digit" });
  }
  function timeAgo(iso) {
    if (!iso) return "";
    var now = Date.now();
    var then = new Date(iso).getTime();
    var diff = Math.floor((now - then) / 1000);
    if (diff < 0) return "just now";
    if (diff < 60) return diff + "s ago";
    var mins = Math.floor(diff / 60);
    if (mins < 60) return mins + "m ago";
    var hours = Math.floor(mins / 60);
    if (hours < 24) return hours + "h ago";
    var days = Math.floor(hours / 24);
    if (days < 30) return days + "d ago";
    var months = Math.floor(days / 30);
    if (months < 12) return months + "mo ago";
    return Math.floor(months / 12) + "y ago";
  }
  function timeAgoFormatter(cell) { return cell.getValue() ? timeAgo(cell.getValue()) : ""; }
  function timeAgoTooltip(e, cell) { return formatDateTime(cell.getValue()); }
  function titleFormatter(cell) {
    var val = cell.getValue();
    if (!val) return "";
    var row = cell.getRow().getData();
    return '<a href="' + row.url + '" target="_blank" rel="noopener">' + val.replace(/</g, "&lt;") + "</a>";
  }
  function isoDateSorter(a, b) {
    if (!a && !b) return 0;
    if (!a) return 1;
    if (!b) return -1;
    return a < b ? -1 : (a > b ? 1 : 0);
  }

  var DATE_RANGE_PRESETS = [
    { label: "Today", value: "0" },
    { label: "Last 7 days", value: "7" },
    { label: "Last 14 days", value: "14" },
    { label: "Last 30 days", value: "30" },
    { label: "Last 90 days", value: "90" }
  ];
  function dateRangeFilter(headerValue, rowValue) {
    if (!headerValue) return true;
    if (!rowValue) return false;
    var days = parseInt(headerValue, 10);
    var rowTime = new Date(rowValue).getTime();
    if (isNaN(rowTime)) return false;
    if (days === 0) {
      var today = new Date().toISOString().slice(0, 10);
      return rowValue.slice(0, 10) === today;
    }
    var cutoff = Date.now() - days * 24 * 60 * 60 * 1000;
    return rowTime >= cutoff;
  }

  var dateFilterParams = { values: DATE_RANGE_PRESETS, clearable: true };
  var listFilterParams = { valuesLookup: true, clearable: true, sort: "asc" };
  function arrayJoinFormatter(cell) {
    var val = cell.getValue();
    return val && Array.isArray(val) ? val.join(", ") : "";
  }
  function arrayContainsFilter(headerValue, rowValue) {
    if (!headerValue) return true;
    if (!rowValue || !Array.isArray(rowValue)) return false;
    return rowValue.indexOf(headerValue) !== -1;
  }
  function arrayValuesLookup(cell) {
    var field = cell.getField();
    var seen = {};
    var values = [];
    cell.getTable().getData().forEach(function(row) {
      var arr = row[field];
      if (arr && Array.isArray(arr)) {
        arr.forEach(function(v) { if (v && !seen[v]) { seen[v] = true; values.push(v); } });
      }
    });
    values.sort();
    return values;
  }
  var arrayFilterParams = { valuesLookup: arrayValuesLookup, clearable: true, sort: "asc" };

  function filterIconHeaderEl(colDef) {
    var wrap = document.createElement("div");
    wrap.className = "col-header-with-filter";
    var titleSpan = document.createElement("span");
    titleSpan.textContent = colDef.title || colDef.field;
    wrap.appendChild(titleSpan);
    var icon = document.createElement("button");
    icon.type = "button";
    icon.className = "col-filter-icon";
    icon.textContent = "\u25BC";
    icon.setAttribute("data-filter-field", colDef.field);
    icon.addEventListener("click", function(e) {
      e.stopPropagation();
      onColumnFilterIconClick(colDef.field, icon);
    });
    wrap.appendChild(icon);
    return wrap;
  }

  var COLUMN_DEFS = [
    { title: "Title", field: "title", formatter: titleFormatter, formatterParams: { allowHtml: true }, minWidth: 250, widthGrow: 3, filterField: "title" },
    { title: "Company", field: "source_name", headerFilter: "list", headerFilterParams: listFilterParams, minWidth: 120, widthGrow: 1, filterField: "source_name" },
    { title: "Location (Raw)", field: "locations_display", minWidth: 150, widthGrow: 1, visible: false },
    { title: "Type", field: "employment_type_label", headerFilter: "list", headerFilterParams: listFilterParams, minWidth: 100, visible: false, filterField: "employment_type" },
    { title: "Published At", field: "published_at", formatter: timeAgoFormatter, tooltip: timeAgoTooltip, sorter: isoDateSorter, headerFilter: "list", headerFilterParams: dateFilterParams, headerFilterFunc: dateRangeFilter, minWidth: 120, filterField: "published_at" },
    { title: "First Seen", field: "first_seen_at", formatter: timeAgoFormatter, tooltip: timeAgoTooltip, sorter: isoDateSorter, headerFilter: "list", headerFilterParams: dateFilterParams, headerFilterFunc: dateRangeFilter, minWidth: 120, filterField: "first_seen_at" },
    { title: "Department", field: "department", minWidth: 120, visible: false, filterField: "department" },
    { title: "Workplace", field: "workplace_type_label", headerFilter: "list", headerFilterParams: listFilterParams, minWidth: 100, visible: false, filterField: "workplace_type" },
    { title: "Country", field: "country", formatter: arrayJoinFormatter, headerFilter: "list", headerFilterParams: arrayFilterParams, headerFilterFunc: arrayContainsFilter, minWidth: 80, filterField: "country" },
    { title: "Region", field: "region", formatter: arrayJoinFormatter, headerFilter: "list", headerFilterParams: arrayFilterParams, headerFilterFunc: arrayContainsFilter, minWidth: 100, visible: false, filterField: "region" },
    { title: "City", field: "city", formatter: arrayJoinFormatter, headerFilter: "list", headerFilterParams: arrayFilterParams, headerFilterFunc: arrayContainsFilter, minWidth: 100, filterField: "city" },
    { title: "Status", field: "status", headerFilter: "list", headerFilterParams: listFilterParams, minWidth: 90, visible: false, filterField: "status" },
    { title: "Last Seen", field: "last_seen_at", formatter: timeAgoFormatter, tooltip: timeAgoTooltip, sorter: isoDateSorter, headerFilter: "list", headerFilterParams: dateFilterParams, headerFilterFunc: dateRangeFilter, minWidth: 120, visible: false, filterField: "last_seen_at" },
    { title: "Team", field: "team", minWidth: 120, visible: false, filterField: "team" },
    { title: "Updated At Source", field: "updated_at_source", formatter: timeAgoFormatter, tooltip: timeAgoTooltip, sorter: isoDateSorter, headerFilter: "list", headerFilterParams: dateFilterParams, headerFilterFunc: dateRangeFilter, minWidth: 120, visible: false, filterField: "updated_at_source" },
    { title: "Expired At", field: "expired_at", formatter: timeAgoFormatter, tooltip: timeAgoTooltip, sorter: isoDateSorter, headerFilter: "list", headerFilterParams: dateFilterParams, headerFilterFunc: dateRangeFilter, minWidth: 120, visible: false, filterField: "expired_at" },
    { title: "External ID", field: "external_id", minWidth: 120, visible: false },
    { title: "Source ID", field: "source_id", minWidth: 100, visible: false },
    { title: "ID", field: "id", minWidth: 80, visible: false }
  ];

  var COLUMN_ORDER_KEY = "jobscout_column_order";
  var DEFAULT_COLUMN_ORDER = COLUMN_DEFS.map(function(c) { return c.field; });

  function applyPersistedColumnOrder(defs) {
    var raw = localStorage.getItem(COLUMN_ORDER_KEY);
    if (!raw) return defs;
    try {
      var savedOrder = JSON.parse(raw);
      if (!Array.isArray(savedOrder)) return defs;
      var defsByField = {};
      defs.forEach(function(d) { defsByField[d.field] = d; });
      var ordered = [];
      savedOrder.forEach(function(field) {
        if (defsByField[field]) {
          ordered.push(defsByField[field]);
          delete defsByField[field];
        }
      });
      Object.keys(defsByField).forEach(function(field) {
        ordered.push(defsByField[field]);
      });
      return ordered;
    } catch (e) {
      return defs;
    }
  }

  function saveColumnOrder(table) {
    var order = table.getColumns().map(function(col) { return col.getField(); });
    localStorage.setItem(COLUMN_ORDER_KEY, JSON.stringify(order));
  }

  function resetColumnOrder() {
    localStorage.removeItem(COLUMN_ORDER_KEY);
    DEFAULT_COLUMN_ORDER.forEach(function(field, index) {
      var col = table.getColumn(field);
      if (col) table.moveColumn(field, COLUMN_DEFS[0].field, true);
    });
    COLUMN_DEFS.forEach(function(def, index) {
      if (index === 0) return;
      table.moveColumn(def.field, COLUMN_DEFS[index - 1].field, false);
    });
  }

  var table = new Tabulator("#jobs-grid", {
    height: "100%",
    layout: "fitColumns",
    movableColumns: true,
    pagination: true,
    paginationSize: 50,
    paginationSizeSelector: [25, 50, 100],
    placeholder: "No jobs found",
    columns: applyPersistedColumnOrder(COLUMN_DEFS),
    initialSort: [{ column: "first_seen_at", dir: "desc" }]
  });

  var summaryNode = document.getElementById("advanced-filter-summary");
  var columnFilterSections = document.getElementById("column-filter-sections");
  var columnsPanelList = document.getElementById("columns-panel-list");
  var panelBackdrop = document.getElementById("panel-backdrop");
  var openColumnsPanelBtn = document.getElementById("open-columns-panel");
  var openFiltersPanelBtn = document.getElementById("open-filters-panel");
  var columnsSidePanel = document.getElementById("columns-side-panel");
  var filtersPanel = document.getElementById("filters-panel");
  var popoverEl = document.getElementById("col-filter-popover");

  var rules = [];
  var activeExpression = null;
  var isSyncingHeader = false;

  function mapApiRows(data) {
    return data.map(function(item) {
      var locs = item.locations || [];
      item.locations_display = locs.map(function(l) { return l.name; }).join(", ") || "";
      item.employment_type_label = EMPLOYMENT_LABELS[item.employment_type] || item.employment_type || "";
      item.workplace_type_label = WORKPLACE_LABELS[item.workplace_type] || item.workplace_type || "";
      item.department = item.department || "";
      item.country = item.country || [];
      item.region = item.region || [];
      item.city = item.city || [];
      item.team = item.team || "";
      return item;
    });
  }

  function fetchJobs(expression) {
    var params = new URLSearchParams();
    if (expression) params.set("filter", JSON.stringify(expression));
    var url = "/api/jobs/" + (params.toString() ? "?" + params.toString() : "");
    return fetch(url)
      .then(function(r) { return r.ok ? r.json() : r.json().then(function(p) { throw new Error(p.error || "Failed to load jobs"); }); })
      .then(function(data) { table.setData(mapApiRows(data)); });
  }

  function openPanel(panelId) {
    closePanels();
    closePopover();
    var panel = document.getElementById(panelId);
    panel.classList.add("open");
    panel.setAttribute("aria-hidden", "false");
    panelBackdrop.classList.add("open");
  }

  function closePanels() {
    [columnsSidePanel, filtersPanel].forEach(function(panel) {
      panel.classList.remove("open");
      panel.setAttribute("aria-hidden", "true");
    });
    panelBackdrop.classList.remove("open");
  }

  function serializeRules() {
    var predicates = [];
    rules.forEach(function(rule) {
      var payload = { field: rule.field, operator: rule.operator };
      if (rule.operator === "is_empty" || rule.operator === "is_not_empty") {
        predicates.push(payload);
        return;
      }
      var rawValue = (rule.value || "").trim();
      if (!rawValue) return;
      if (rule.operator === "in" || rule.operator === "not_in") {
        var listValue = rawValue.split(",").map(function(part) { return part.trim(); }).filter(Boolean);
        if (!listValue.length) return;
        payload.value = listValue;
        predicates.push(payload);
        return;
      }
      if (rule.operator === "in_last_days") {
        var parsed = parseInt(rawValue, 10);
        if (isNaN(parsed) || parsed < 0) return;
        payload.value = parsed;
        predicates.push(payload);
        return;
      }
      payload.value = rawValue;
      predicates.push(payload);
    });
    if (!predicates.length) return null;
    if (predicates.length === 1) return predicates[0];
    return { op: "and", children: predicates };
  }

  function expressionToText(node) {
    if (!node) return "No filters applied";
    if (node.op) {
      if (node.op === "not") return "NOT (" + expressionToText(node.child) + ")";
      var joiner = node.op.toUpperCase();
      return node.children.map(function(child) { return "(" + expressionToText(child) + ")"; }).join(" " + joiner + " ");
    }
    var fieldLabel = FILTER_FIELD_DEFS[node.field] ? FILTER_FIELD_DEFS[node.field].label : node.field;
    var operatorLabel = OPERATOR_LABELS[node.operator] || node.operator;
    if (typeof node.value === "undefined") return fieldLabel + " " + operatorLabel;
    return fieldLabel + " " + operatorLabel + " " + (Array.isArray(node.value) ? node.value.join(", ") : node.value);
  }

  function updateFilterSummary() {
    summaryNode.textContent = expressionToText(activeExpression);
  }

  function rulesForField(field) {
    return rules.filter(function(r) { return r.field === field; });
  }

  function addRule(field) {
    var def = FILTER_FIELD_DEFS[field];
    rules.push({ field: field, operator: def.operators[0], value: "" });
  }

  function removeRule(index) {
    rules.splice(index, 1);
  }

  function renderRuleRow(rule, ruleIndex, container) {
    var row = document.createElement("div");
    row.className = "filter-rule-row";
    var topRow = document.createElement("div");
    topRow.className = "filter-rule-top";

    var opSelect = document.createElement("select");
    FILTER_FIELD_DEFS[rule.field].operators.forEach(function(operator) {
      var option = document.createElement("option");
      option.value = operator;
      option.textContent = OPERATOR_LABELS[operator] || operator;
      opSelect.appendChild(option);
    });
    opSelect.value = rule.operator;
    opSelect.addEventListener("change", function() {
      rule.operator = opSelect.value;
      rebuildValueInput();
    });
    topRow.appendChild(opSelect);

    var removeBtn = document.createElement("button");
    removeBtn.type = "button";
    removeBtn.className = "chip-btn danger";
    removeBtn.textContent = "Remove";
    removeBtn.addEventListener("click", function() {
      removeRule(ruleIndex);
      renderColumnFilterSections();
      renderPopoverForField(rule.field);
    });
    topRow.appendChild(removeBtn);

    var valueRow = document.createElement("div");
    valueRow.className = "filter-rule-value";
    var valueWrap = document.createElement("div");
    valueWrap.className = "value-wrap";
    valueRow.appendChild(valueWrap);

    function rebuildValueInput() {
      valueWrap.innerHTML = "";
      if (rule.operator === "is_empty" || rule.operator === "is_not_empty") {
        var hint = document.createElement("span");
        hint.className = "filter-value-hint";
        hint.textContent = "No value needed";
        valueWrap.appendChild(hint);
        return;
      }
      var input = document.createElement("input");
      input.type = FILTER_FIELD_DEFS[rule.field].type === "date" && rule.operator !== "in_last_days" ? "datetime-local" : "text";
      if (rule.operator === "in_last_days") {
        input.type = "number";
        input.min = "0";
        input.step = "1";
      }
      if (rule.operator === "in" || rule.operator === "not_in") {
        input.placeholder = "value1, value2";
      }
      input.value = rule.value || "";
      input.addEventListener("input", function() { rule.value = input.value; });
      valueWrap.appendChild(input);
    }

    rebuildValueInput();

    row.appendChild(topRow);
    row.appendChild(valueRow);
    container.appendChild(row);
  }

  function renderColumnFilterSections() {
    columnFilterSections.innerHTML = "";
    FIELD_ORDER.forEach(function(field) {
      var fieldRules = rulesForField(field);
      var section = document.createElement("div");
      section.className = "col-filter-section";
      section.setAttribute("data-filter-section", field);

      var header = document.createElement("div");
      header.className = "col-filter-section-header";
      var label = document.createElement("span");
      label.className = "col-filter-section-label";
      label.textContent = FILTER_FIELD_DEFS[field].label;
      if (fieldRules.length) {
        var badge = document.createElement("span");
        badge.className = "col-filter-count";
        badge.textContent = fieldRules.length;
        label.appendChild(badge);
      }
      header.appendChild(label);

      var addBtn = document.createElement("button");
      addBtn.type = "button";
      addBtn.className = "chip-btn";
      addBtn.textContent = "+ Rule";
      addBtn.addEventListener("click", function() {
        addRule(field);
        renderColumnFilterSections();
        renderPopoverForField(field);
      });
      header.appendChild(addBtn);
      section.appendChild(header);

      if (fieldRules.length) {
        var body = document.createElement("div");
        body.className = "col-filter-section-body";
        fieldRules.forEach(function(rule) {
          var globalIndex = rules.indexOf(rule);
          renderRuleRow(rule, globalIndex, body);
        });
        section.appendChild(body);
      }

      columnFilterSections.appendChild(section);
    });
  }

  function closePopover() {
    popoverEl.style.display = "none";
    popoverEl.innerHTML = "";
    popoverEl.removeAttribute("data-field");
  }

  function renderPopoverForField(field) {
    if (popoverEl.getAttribute("data-field") !== field) return;
    renderPopoverContent(field);
  }

  function renderPopoverContent(field) {
    popoverEl.innerHTML = "";
    var def = FILTER_FIELD_DEFS[field];
    var heading = document.createElement("div");
    heading.className = "popover-heading";
    heading.textContent = def.label + " Filters";
    popoverEl.appendChild(heading);

    var fieldRules = rulesForField(field);
    if (!fieldRules.length) {
      var empty = document.createElement("p");
      empty.className = "filter-empty";
      empty.textContent = "No rules for this column";
      popoverEl.appendChild(empty);
    } else {
      fieldRules.forEach(function(rule) {
        var globalIndex = rules.indexOf(rule);
        renderRuleRow(rule, globalIndex, popoverEl);
      });
    }

    var addBtn = document.createElement("button");
    addBtn.type = "button";
    addBtn.className = "chip-btn";
    addBtn.textContent = "+ Add Rule";
    addBtn.addEventListener("click", function() {
      addRule(field);
      renderPopoverContent(field);
      renderColumnFilterSections();
    });
    popoverEl.appendChild(addBtn);
  }

  function onColumnFilterIconClick(filterField, iconEl) {
    if (window.innerWidth <= 768) {
      openPanel("filters-panel");
      renderColumnFilterSections();
      setTimeout(function() {
        var section = columnFilterSections.querySelector("[data-filter-section='" + filterField + "']");
        if (section) section.scrollIntoView({ behavior: "smooth", block: "start" });
      }, 100);
      return;
    }

    if (popoverEl.style.display !== "none" && popoverEl.getAttribute("data-field") === filterField) {
      closePopover();
      return;
    }

    var rect = iconEl.getBoundingClientRect();
    popoverEl.style.display = "block";
    popoverEl.style.top = (rect.bottom + 4) + "px";
    popoverEl.style.left = Math.max(8, rect.left - 150) + "px";
    popoverEl.setAttribute("data-field", filterField);
    renderPopoverContent(filterField);
  }

  function applyFilters() {
    activeExpression = serializeRules();
    syncHeaderFromRules();
    fetchJobs(activeExpression)
      .then(updateFilterSummary)
      .catch(function(err) { window.alert(err.message); });
  }

  function clearAllFilters() {
    rules = [];
    activeExpression = null;
    isSyncingHeader = true;
    table.clearHeaderFilter();
    isSyncingHeader = false;
    renderColumnFilterSections();
    closePopover();
    fetchJobs(null).then(updateFilterSummary);
  }

  function syncHeaderFromRules() {
    isSyncingHeader = true;
    table.clearHeaderFilter();
    rules.forEach(function(rule) {
      var def = FILTER_FIELD_DEFS[rule.field];
      if (!def || !def.headerField) return;
      if (rule.operator !== "eq" && rule.operator !== "in_last_days") return;
      var value = (rule.value || "").trim();
      if (!value) return;
      if (rule.field === "employment_type") value = EMPLOYMENT_LABELS[value] || value;
      if (rule.field === "workplace_type") value = WORKPLACE_LABELS[value] || value;
      table.setHeaderFilterValue(def.headerField, value);
    });
    isSyncingHeader = false;
  }

  function headerFilterToRule(headerField, headerValue) {
    for (var i = 0; i < FIELD_ORDER.length; i++) {
      var field = FIELD_ORDER[i];
      var def = FILTER_FIELD_DEFS[field];
      if (def.headerField === headerField) {
        var operator = def.type === "date" ? "in_last_days" : "eq";
        var value = headerValue;
        if (field === "employment_type") {
          var EMPLOYMENT_KEY_BY_LABEL = {};
          Object.keys(EMPLOYMENT_LABELS).forEach(function(key) { EMPLOYMENT_KEY_BY_LABEL[EMPLOYMENT_LABELS[key]] = key; });
          value = EMPLOYMENT_KEY_BY_LABEL[headerValue] || headerValue;
        }
        if (field === "workplace_type") {
          var WORKPLACE_KEY_BY_LABEL = {};
          Object.keys(WORKPLACE_LABELS).forEach(function(key) { WORKPLACE_KEY_BY_LABEL[WORKPLACE_LABELS[key]] = key; });
          value = WORKPLACE_KEY_BY_LABEL[headerValue] || headerValue;
        }
        return { field: field, operator: operator, value: String(value) };
      }
    }
    return null;
  }

  function buildColumnsPanel() {
    columnsPanelList.innerHTML = "";
    table.getColumns().forEach(function(col) {
      var def = col.getDefinition();
      var label = document.createElement("label");
      label.className = "columns-panel-item";
      var cb = document.createElement("input");
      cb.type = "checkbox";
      cb.checked = col.isVisible();
      cb.addEventListener("change", function() { col.toggle(); });
      label.appendChild(cb);
      label.appendChild(document.createTextNode(def.title || def.field));
      columnsPanelList.appendChild(label);
    });
  }

  openColumnsPanelBtn.addEventListener("click", function() { buildColumnsPanel(); openPanel("columns-side-panel"); });
  openFiltersPanelBtn.addEventListener("click", function() { renderColumnFilterSections(); openPanel("filters-panel"); });
  document.getElementById("reset-columns").addEventListener("click", resetColumnOrder);
  panelBackdrop.addEventListener("click", function() { closePanels(); closePopover(); });
  document.querySelectorAll("[data-close-panel]").forEach(function(btn) { btn.addEventListener("click", closePanels); });
  document.addEventListener("keydown", function(event) { if (event.key === "Escape") { closePanels(); closePopover(); } });

  document.addEventListener("click", function(e) {
    if (popoverEl.style.display !== "none" && !popoverEl.contains(e.target) && !e.target.classList.contains("col-filter-icon")) {
      closePopover();
    }
  });

  document.getElementById("apply-filters").addEventListener("click", applyFilters);
  document.getElementById("clear-all-filters").addEventListener("click", clearAllFilters);

  table.on("columnMoved", function() { saveColumnOrder(table); });

  table.on("dataFiltered", function() {
    if (isSyncingHeader) return;
    var headerFilters = table.getHeaderFilters();
    headerFilters.forEach(function(filter) {
      if (filter.value === "" || filter.value === null || typeof filter.value === "undefined") return;
      var newRule = headerFilterToRule(filter.field, filter.value);
      if (!newRule) return;
      var existingIndex = -1;
      for (var i = 0; i < rules.length; i++) {
        if (rules[i].field === newRule.field && (rules[i].operator === "eq" || rules[i].operator === "in_last_days")) {
          existingIndex = i;
          break;
        }
      }
      if (existingIndex >= 0) {
        rules[existingIndex].value = newRule.value;
      } else {
        rules.push(newRule);
      }
    });
    activeExpression = serializeRules();
    updateFilterSummary();
  });

  renderColumnFilterSections();
  fetchJobs(null).then(updateFilterSummary);
})();
</script>
{% endblock %}
