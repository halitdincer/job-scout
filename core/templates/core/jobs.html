{% extends "core/base.html" %}

{% block title %}Jobs - Job Scout{% endblock %}

{% block main_attrs %} class="full-bleed"{% endblock %}

{% block content %}
<div class="jobs-toolbar">
  <div class="jobs-toolbar-left">
    <button class="col-chooser-btn" id="open-columns-panel">Columns</button>
    <button class="col-chooser-btn" id="open-filters-panel">Filters</button>
  </div>
  <div id="advanced-filter-summary" class="filter-summary">No filters applied</div>
</div>

<div id="jobs-grid"></div>

<div id="panel-backdrop" class="panel-backdrop"></div>

<aside id="columns-side-panel" class="side-panel" aria-hidden="true">
  <div class="side-panel-header">
    <h2>Columns</h2>
    <button type="button" class="panel-close" data-close-panel="columns-side-panel">x</button>
  </div>
  <p class="side-panel-subtitle">Show or hide columns.</p>
  <div id="columns-panel-list" class="columns-panel-list"></div>
</aside>

<aside id="filters-panel" class="side-panel" aria-hidden="true">
  <div class="side-panel-header">
    <h2>Filters</h2>
    <button type="button" class="panel-close" data-close-panel="filters-panel">x</button>
  </div>
  <p class="side-panel-subtitle">Panel and header filters stay in sync for supported filters.</p>

  <div class="filter-builder-controls">
    <label for="root-group-op">Match</label>
    <select id="root-group-op">
      <option value="and">All conditions (AND)</option>
      <option value="or">Any condition (OR)</option>
      <option value="not">NOT (invert single child)</option>
    </select>
  </div>

  <div class="quick-filters-mirror" id="quick-filters-mirror"></div>
  <div id="filter-builder-root" class="filter-builder-root"></div>

  <div class="filter-panel-actions">
    <button type="button" id="add-root-rule" class="col-chooser-btn">Add Rule</button>
    <button type="button" id="add-root-group" class="col-chooser-btn">Add Group</button>
    <button type="button" id="clear-advanced-filter" class="col-chooser-btn">Clear</button>
    <button type="button" id="apply-advanced-filter" class="panel-primary-btn">Apply</button>
  </div>
</aside>

<script>
(function() {
  var EMPLOYMENT_LABELS = {
    full_time: "Full-time",
    part_time: "Part-time",
    contract: "Contract",
    intern: "Intern",
    temporary: "Temporary",
    unknown: "Unknown"
  };
  var WORKPLACE_LABELS = {
    on_site: "On-site",
    remote: "Remote",
    hybrid: "Hybrid",
    unknown: "Unknown"
  };
  var EMPLOYMENT_KEY_BY_LABEL = {};
  var WORKPLACE_KEY_BY_LABEL = {};
  Object.keys(EMPLOYMENT_LABELS).forEach(function(key) { EMPLOYMENT_KEY_BY_LABEL[EMPLOYMENT_LABELS[key]] = key; });
  Object.keys(WORKPLACE_LABELS).forEach(function(key) { WORKPLACE_KEY_BY_LABEL[WORKPLACE_LABELS[key]] = key; });

  var FILTER_FIELD_DEFS = {
    title: { label: "Title", type: "text", operators: ["contains", "not_contains", "eq", "neq", "is_empty", "is_not_empty"] },
    source_name: { label: "Company", type: "text", operators: ["contains", "eq", "neq", "is_empty", "is_not_empty"] },
    status: { label: "Status", type: "enum", operators: ["eq", "neq", "in", "not_in"] },
    department: { label: "Department", type: "text", operators: ["contains", "not_contains", "eq", "neq", "is_empty", "is_not_empty"] },
    team: { label: "Team", type: "text", operators: ["contains", "not_contains", "eq", "neq", "is_empty", "is_not_empty"] },
    employment_type: { label: "Type", type: "enum", operators: ["eq", "neq", "in", "not_in"] },
    workplace_type: { label: "Workplace", type: "enum", operators: ["eq", "neq", "in", "not_in"] },
    country: { label: "Country", type: "array", operators: ["eq", "neq", "in", "not_in", "is_empty", "is_not_empty"] },
    region: { label: "Region", type: "array", operators: ["eq", "neq", "in", "not_in", "is_empty", "is_not_empty"] },
    city: { label: "City", type: "array", operators: ["contains", "not_contains", "eq", "neq", "in", "not_in", "is_empty", "is_not_empty"] },
    published_at: { label: "Published At", type: "date", operators: ["before", "after", "in_last_days", "is_empty", "is_not_empty"] },
    first_seen_at: { label: "First Seen", type: "date", operators: ["before", "after", "in_last_days", "is_empty", "is_not_empty"] },
    last_seen_at: { label: "Last Seen", type: "date", operators: ["before", "after", "in_last_days", "is_empty", "is_not_empty"] },
    updated_at_source: { label: "Updated At Source", type: "date", operators: ["before", "after", "in_last_days", "is_empty", "is_not_empty"] },
    expired_at: { label: "Expired At", type: "date", operators: ["before", "after", "in_last_days", "is_empty", "is_not_empty"] }
  };
  var FIELD_ORDER = Object.keys(FILTER_FIELD_DEFS);
  var OPERATOR_LABELS = {
    contains: "contains",
    not_contains: "does not contain",
    eq: "equals",
    neq: "does not equal",
    in: "is any of",
    not_in: "is none of",
    is_empty: "is empty",
    is_not_empty: "is not empty",
    before: "before",
    after: "after",
    in_last_days: "in last N days"
  };

  var HEADER_FIELD_TO_AST = {
    source_name: { field: "source_name", operator: "eq" },
    employment_type_label: { field: "employment_type", operator: "eq", decode: function(v) { return EMPLOYMENT_KEY_BY_LABEL[v] || v; }, encode: function(v) { return EMPLOYMENT_LABELS[v] || v; } },
    workplace_type_label: { field: "workplace_type", operator: "eq", decode: function(v) { return WORKPLACE_KEY_BY_LABEL[v] || v; }, encode: function(v) { return WORKPLACE_LABELS[v] || v; } },
    country: { field: "country", operator: "eq" },
    region: { field: "region", operator: "eq" },
    city: { field: "city", operator: "eq" },
    status: { field: "status", operator: "eq" },
    published_at: { field: "published_at", operator: "in_last_days", decode: function(v) { return parseInt(v, 10); }, encode: function(v) { return String(v); } },
    first_seen_at: { field: "first_seen_at", operator: "in_last_days", decode: function(v) { return parseInt(v, 10); }, encode: function(v) { return String(v); } },
    last_seen_at: { field: "last_seen_at", operator: "in_last_days", decode: function(v) { return parseInt(v, 10); }, encode: function(v) { return String(v); } },
    updated_at_source: { field: "updated_at_source", operator: "in_last_days", decode: function(v) { return parseInt(v, 10); }, encode: function(v) { return String(v); } },
    expired_at: { field: "expired_at", operator: "in_last_days", decode: function(v) { return parseInt(v, 10); }, encode: function(v) { return String(v); } }
  };
  var AST_FIELD_TO_HEADER = {
    source_name: "source_name",
    employment_type: "employment_type_label",
    workplace_type: "workplace_type_label",
    country: "country",
    region: "region",
    city: "city",
    status: "status",
    published_at: "published_at",
    first_seen_at: "first_seen_at",
    last_seen_at: "last_seen_at",
    updated_at_source: "updated_at_source",
    expired_at: "expired_at"
  };

  function formatDateTime(iso) {
    if (!iso) return "";
    var d = new Date(iso);
    return d.toLocaleString("en-US", { month: "short", day: "numeric", year: "numeric", hour: "numeric", minute: "2-digit" });
  }
  function timeAgo(iso) {
    if (!iso) return "";
    var now = Date.now();
    var then = new Date(iso).getTime();
    var diff = Math.floor((now - then) / 1000);
    if (diff < 0) return "just now";
    if (diff < 60) return diff + "s ago";
    var mins = Math.floor(diff / 60);
    if (mins < 60) return mins + "m ago";
    var hours = Math.floor(mins / 60);
    if (hours < 24) return hours + "h ago";
    var days = Math.floor(hours / 24);
    if (days < 30) return days + "d ago";
    var months = Math.floor(days / 30);
    if (months < 12) return months + "mo ago";
    return Math.floor(months / 12) + "y ago";
  }
  function timeAgoFormatter(cell) { return cell.getValue() ? timeAgo(cell.getValue()) : ""; }
  function timeAgoTooltip(e, cell) { return formatDateTime(cell.getValue()); }
  function titleFormatter(cell) {
    var val = cell.getValue();
    if (!val) return "";
    var row = cell.getRow().getData();
    return '<a href="' + row.url + '" target="_blank" rel="noopener">' + val.replace(/</g, "&lt;") + "</a>";
  }
  function isoDateSorter(a, b) {
    if (!a && !b) return 0;
    if (!a) return 1;
    if (!b) return -1;
    return a < b ? -1 : (a > b ? 1 : 0);
  }

  var DATE_RANGE_PRESETS = [
    { label: "Today", value: "0" },
    { label: "Last 7 days", value: "7" },
    { label: "Last 14 days", value: "14" },
    { label: "Last 30 days", value: "30" },
    { label: "Last 90 days", value: "90" }
  ];
  function dateRangeFilter(headerValue, rowValue) {
    if (!headerValue) return true;
    if (!rowValue) return false;
    var days = parseInt(headerValue, 10);
    var rowTime = new Date(rowValue).getTime();
    if (isNaN(rowTime)) return false;
    if (days === 0) {
      var today = new Date().toISOString().slice(0, 10);
      return rowValue.slice(0, 10) === today;
    }
    var cutoff = Date.now() - days * 24 * 60 * 60 * 1000;
    return rowTime >= cutoff;
  }

  var dateFilterParams = { values: DATE_RANGE_PRESETS, clearable: true };
  var listFilterParams = { valuesLookup: true, clearable: true, sort: "asc" };
  function arrayJoinFormatter(cell) {
    var val = cell.getValue();
    return val && Array.isArray(val) ? val.join(", ") : "";
  }
  function arrayContainsFilter(headerValue, rowValue) {
    if (!headerValue) return true;
    if (!rowValue || !Array.isArray(rowValue)) return false;
    return rowValue.indexOf(headerValue) !== -1;
  }
  function arrayValuesLookup(cell) {
    var field = cell.getField();
    var seen = {};
    var values = [];
    cell.getTable().getData().forEach(function(row) {
      var arr = row[field];
      if (arr && Array.isArray(arr)) {
        arr.forEach(function(v) { if (v && !seen[v]) { seen[v] = true; values.push(v); } });
      }
    });
    values.sort();
    return values;
  }
  var arrayFilterParams = { valuesLookup: arrayValuesLookup, clearable: true, sort: "asc" };

  var table = new Tabulator("#jobs-grid", {
    height: "100%",
    layout: "fitColumns",
    pagination: true,
    paginationSize: 50,
    paginationSizeSelector: [25, 50, 100],
    placeholder: "No jobs found",
    columns: [
      { title: "Title", field: "title", formatter: titleFormatter, formatterParams: { allowHtml: true }, minWidth: 250, widthGrow: 3 },
      { title: "Company", field: "source_name", headerFilter: "list", headerFilterParams: listFilterParams, minWidth: 120, widthGrow: 1 },
      { title: "Location (Raw)", field: "locations_display", minWidth: 150, widthGrow: 1, visible: false },
      { title: "Type", field: "employment_type_label", headerFilter: "list", headerFilterParams: listFilterParams, minWidth: 100, visible: false },
      { title: "Published At", field: "published_at", formatter: timeAgoFormatter, tooltip: timeAgoTooltip, sorter: isoDateSorter, headerFilter: "list", headerFilterParams: dateFilterParams, headerFilterFunc: dateRangeFilter, minWidth: 120 },
      { title: "First Seen", field: "first_seen_at", formatter: timeAgoFormatter, tooltip: timeAgoTooltip, sorter: isoDateSorter, headerFilter: "list", headerFilterParams: dateFilterParams, headerFilterFunc: dateRangeFilter, minWidth: 120 },
      { title: "Department", field: "department", minWidth: 120, visible: false },
      { title: "Workplace", field: "workplace_type_label", headerFilter: "list", headerFilterParams: listFilterParams, minWidth: 100, visible: false },
      { title: "Country", field: "country", formatter: arrayJoinFormatter, headerFilter: "list", headerFilterParams: arrayFilterParams, headerFilterFunc: arrayContainsFilter, minWidth: 80 },
      { title: "Region", field: "region", formatter: arrayJoinFormatter, headerFilter: "list", headerFilterParams: arrayFilterParams, headerFilterFunc: arrayContainsFilter, minWidth: 100, visible: false },
      { title: "City", field: "city", formatter: arrayJoinFormatter, headerFilter: "list", headerFilterParams: arrayFilterParams, headerFilterFunc: arrayContainsFilter, minWidth: 100 },
      { title: "Status", field: "status", headerFilter: "list", headerFilterParams: listFilterParams, minWidth: 90, visible: false },
      { title: "Last Seen", field: "last_seen_at", formatter: timeAgoFormatter, tooltip: timeAgoTooltip, sorter: isoDateSorter, headerFilter: "list", headerFilterParams: dateFilterParams, headerFilterFunc: dateRangeFilter, minWidth: 120, visible: false },
      { title: "Team", field: "team", minWidth: 120, visible: false },
      { title: "Updated At Source", field: "updated_at_source", formatter: timeAgoFormatter, tooltip: timeAgoTooltip, sorter: isoDateSorter, headerFilter: "list", headerFilterParams: dateFilterParams, headerFilterFunc: dateRangeFilter, minWidth: 120, visible: false },
      { title: "Expired At", field: "expired_at", formatter: timeAgoFormatter, tooltip: timeAgoTooltip, sorter: isoDateSorter, headerFilter: "list", headerFilterParams: dateFilterParams, headerFilterFunc: dateRangeFilter, minWidth: 120, visible: false },
      { title: "External ID", field: "external_id", minWidth: 120, visible: false },
      { title: "Source ID", field: "source_id", minWidth: 100, visible: false },
      { title: "ID", field: "id", minWidth: 80, visible: false }
    ],
    initialSort: [{ column: "first_seen_at", dir: "desc" }]
  });

  var quickSummaryNode = document.getElementById("advanced-filter-summary");
  var quickMirrorNode = document.getElementById("quick-filters-mirror");
  var columnsPanelList = document.getElementById("columns-panel-list");
  var panelBackdrop = document.getElementById("panel-backdrop");
  var openColumnsPanelBtn = document.getElementById("open-columns-panel");
  var openFiltersPanelBtn = document.getElementById("open-filters-panel");
  var columnsSidePanel = document.getElementById("columns-side-panel");
  var filtersPanel = document.getElementById("filters-panel");
  var rootGroupOp = document.getElementById("root-group-op");
  var filterBuilderRoot = document.getElementById("filter-builder-root");

  var advancedState = { op: "and", children: [] };
  var activeAdvancedExpression = null;
  var isSyncingHeader = false;

  function mapApiRows(data) {
    return data.map(function(item) {
      var locs = item.locations || [];
      item.locations_display = locs.map(function(l) { return l.name; }).join(", ") || "";
      item.employment_type_label = EMPLOYMENT_LABELS[item.employment_type] || item.employment_type || "";
      item.workplace_type_label = WORKPLACE_LABELS[item.workplace_type] || item.workplace_type || "";
      item.department = item.department || "";
      item.country = item.country || [];
      item.region = item.region || [];
      item.city = item.city || [];
      item.team = item.team || "";
      return item;
    });
  }
  function fetchJobs(expression) {
    var params = new URLSearchParams();
    if (expression) params.set("filter", JSON.stringify(expression));
    var url = "/api/jobs/" + (params.toString() ? "?" + params.toString() : "");
    return fetch(url)
      .then(function(r) { return r.ok ? r.json() : r.json().then(function(p) { throw new Error(p.error || "Failed to load jobs"); }); })
      .then(function(data) { table.setData(mapApiRows(data)); });
  }

  function openPanel(panelId) {
    closePanels();
    var panel = document.getElementById(panelId);
    panel.classList.add("open");
    panel.setAttribute("aria-hidden", "false");
    panelBackdrop.classList.add("open");
  }
  function closePanels() {
    [columnsSidePanel, filtersPanel].forEach(function(panel) {
      panel.classList.remove("open");
      panel.setAttribute("aria-hidden", "true");
    });
    panelBackdrop.classList.remove("open");
  }

  function createRuleNode() { return { field: "title", operator: "contains", value: "" }; }
  function createGroupNode() { return { op: "and", children: [] }; }
  function normalizeGroupChildren(groupNode) {
    if (groupNode.op === "not") {
      groupNode.children = groupNode.children.length ? [groupNode.children[0]] : [createRuleNode()];
    }
  }
  function renderFilterBuilder() {
    filterBuilderRoot.innerHTML = "";
    renderGroup(filterBuilderRoot, advancedState, null, null);
    rootGroupOp.value = advancedState.op;
  }
  function renderGroup(parentEl, groupNode, parentNode, childIndex) {
    normalizeGroupChildren(groupNode);
    var groupEl = document.createElement("div");
    groupEl.className = "filter-group";
    var header = document.createElement("div");
    header.className = "filter-group-header";
    var opSelect = document.createElement("select");
    ["and", "or", "not"].forEach(function(op) {
      var option = document.createElement("option");
      option.value = op;
      option.textContent = op.toUpperCase();
      opSelect.appendChild(option);
    });
    opSelect.value = groupNode.op;
    opSelect.addEventListener("change", function() { groupNode.op = opSelect.value; normalizeGroupChildren(groupNode); renderFilterBuilder(); });
    header.appendChild(opSelect);

    var addRuleBtn = document.createElement("button");
    addRuleBtn.type = "button";
    addRuleBtn.className = "chip-btn";
    addRuleBtn.textContent = "+ Rule";
    addRuleBtn.addEventListener("click", function() { groupNode.children = groupNode.op === "not" ? [createRuleNode()] : groupNode.children.concat([createRuleNode()]); renderFilterBuilder(); });
    header.appendChild(addRuleBtn);

    var addGroupBtn = document.createElement("button");
    addGroupBtn.type = "button";
    addGroupBtn.className = "chip-btn";
    addGroupBtn.textContent = "+ Group";
    addGroupBtn.addEventListener("click", function() { groupNode.children = groupNode.op === "not" ? [createGroupNode()] : groupNode.children.concat([createGroupNode()]); renderFilterBuilder(); });
    header.appendChild(addGroupBtn);

    if (parentNode) {
      var removeBtn = document.createElement("button");
      removeBtn.type = "button";
      removeBtn.className = "chip-btn danger";
      removeBtn.textContent = "Remove";
      removeBtn.addEventListener("click", function() { parentNode.children.splice(childIndex, 1); renderFilterBuilder(); });
      header.appendChild(removeBtn);
    }
    groupEl.appendChild(header);

    var body = document.createElement("div");
    body.className = "filter-group-body";
    if (!groupNode.children.length) {
      var empty = document.createElement("p");
      empty.className = "filter-empty";
      empty.textContent = "No rules yet";
      body.appendChild(empty);
    } else {
      groupNode.children.forEach(function(node, index) {
        if (node.op) renderGroup(body, node, groupNode, index);
        else renderRule(body, node, groupNode, index);
      });
    }
    groupEl.appendChild(body);
    parentEl.appendChild(groupEl);
  }
  function renderRule(parentEl, ruleNode, parentNode, childIndex) {
    var row = document.createElement("div");
    row.className = "filter-rule-row";
    var fieldSelect = document.createElement("select");
    FIELD_ORDER.forEach(function(fieldName) {
      var option = document.createElement("option");
      option.value = fieldName;
      option.textContent = FILTER_FIELD_DEFS[fieldName].label;
      fieldSelect.appendChild(option);
    });
    fieldSelect.value = ruleNode.field;
    row.appendChild(fieldSelect);

    var opSelect = document.createElement("select");
    row.appendChild(opSelect);
    var valueWrap = document.createElement("div");
    valueWrap.className = "value-wrap";
    row.appendChild(valueWrap);

    function rebuildValueInput() {
      valueWrap.innerHTML = "";
      if (ruleNode.operator === "is_empty" || ruleNode.operator === "is_not_empty") {
        var hint = document.createElement("span");
        hint.className = "filter-value-hint";
        hint.textContent = "No value";
        valueWrap.appendChild(hint);
        return;
      }
      var input = document.createElement("input");
      input.type = FILTER_FIELD_DEFS[ruleNode.field].type === "date" && ruleNode.operator !== "in_last_days" ? "datetime-local" : "text";
      if (ruleNode.operator === "in_last_days") {
        input.type = "number";
        input.min = "0";
        input.step = "1";
      }
      if (ruleNode.operator === "in" || ruleNode.operator === "not_in") {
        input.placeholder = "value1, value2";
      }
      input.value = ruleNode.value || "";
      input.addEventListener("input", function() { ruleNode.value = input.value; });
      valueWrap.appendChild(input);
    }

    function rebuildOperatorSelect() {
      opSelect.innerHTML = "";
      FILTER_FIELD_DEFS[ruleNode.field].operators.forEach(function(operator) {
        var option = document.createElement("option");
        option.value = operator;
        option.textContent = OPERATOR_LABELS[operator] || operator;
        opSelect.appendChild(option);
      });
      if (FILTER_FIELD_DEFS[ruleNode.field].operators.indexOf(ruleNode.operator) === -1) {
        ruleNode.operator = FILTER_FIELD_DEFS[ruleNode.field].operators[0];
      }
      opSelect.value = ruleNode.operator;
      rebuildValueInput();
    }

    fieldSelect.addEventListener("change", function() { ruleNode.field = fieldSelect.value; rebuildOperatorSelect(); });
    opSelect.addEventListener("change", function() { ruleNode.operator = opSelect.value; rebuildValueInput(); });
    rebuildOperatorSelect();

    var removeBtn = document.createElement("button");
    removeBtn.type = "button";
    removeBtn.className = "chip-btn danger";
    removeBtn.textContent = "Remove";
    removeBtn.addEventListener("click", function() { parentNode.children.splice(childIndex, 1); renderFilterBuilder(); });
    row.appendChild(removeBtn);
    parentEl.appendChild(row);
  }

  function serializeNode(node) {
    if (node.op) {
      if (!node.children.length) return null;
      if (node.op === "not") {
        var notChild = serializeNode(node.children[0]);
        return notChild ? { op: "not", child: notChild } : null;
      }
      var children = node.children.map(serializeNode).filter(Boolean);
      return children.length ? { op: node.op, children: children } : null;
    }
    var payload = { field: node.field, operator: node.operator };
    if (node.operator === "is_empty" || node.operator === "is_not_empty") return payload;
    var rawValue = (node.value || "").trim();
    if (!rawValue) return null;
    if (node.operator === "in" || node.operator === "not_in") {
      var listValue = rawValue.split(",").map(function(part) { return part.trim(); }).filter(Boolean);
      if (!listValue.length) return null;
      payload.value = listValue;
      return payload;
    }
    if (node.operator === "in_last_days") {
      var parsed = parseInt(rawValue, 10);
      if (isNaN(parsed) || parsed < 0) return null;
      payload.value = parsed;
      return payload;
    }
    payload.value = rawValue;
    return payload;
  }

  function expressionToText(node) {
    if (!node) return "No filters applied";
    if (node.op) {
      if (node.op === "not") return "NOT (" + expressionToText(node.child) + ")";
      var joiner = node.op.toUpperCase();
      return node.children.map(function(child) { return "(" + expressionToText(child) + ")"; }).join(" " + joiner + " ");
    }
    var fieldLabel = FILTER_FIELD_DEFS[node.field] ? FILTER_FIELD_DEFS[node.field].label : node.field;
    var operatorLabel = OPERATOR_LABELS[node.operator] || node.operator;
    if (typeof node.value === "undefined") return fieldLabel + " " + operatorLabel;
    return fieldLabel + " " + operatorLabel + " " + (Array.isArray(node.value) ? node.value.join(", ") : node.value);
  }

  function headerFiltersToExpression() {
    var rules = [];
    table.getHeaderFilters().forEach(function(filter) {
      var map = HEADER_FIELD_TO_AST[filter.field];
      if (!map || filter.value === "" || filter.value === null || typeof filter.value === "undefined") return;
      var value = map.decode ? map.decode(filter.value) : filter.value;
      if (typeof value === "number" && isNaN(value)) return;
      rules.push({ field: map.field, operator: map.operator, value: value });
    });
    if (!rules.length) return null;
    return rules.length === 1 ? rules[0] : { op: "and", children: rules };
  }

  function mergeExpressions(exprA, exprB) {
    if (!exprA) return exprB;
    if (!exprB) return exprA;
    return { op: "and", children: [exprA, exprB] };
  }

  function expressionToHeaderValueMap(expression) {
    if (!expression) return {};
    var map = {};
    function visit(node) {
      if (!node) return;
      if (node.op) {
        if (node.op !== "and") return;
        node.children.forEach(visit);
        return;
      }
      var headerField = AST_FIELD_TO_HEADER[node.field];
      if (!headerField) return;
      if (node.operator !== "eq" && node.operator !== "in_last_days") return;
      if (map[headerField]) return;
      var sourceMap = HEADER_FIELD_TO_AST[headerField];
      map[headerField] = sourceMap && sourceMap.encode ? sourceMap.encode(node.value) : node.value;
    }
    visit(expression);
    return map;
  }

  function syncHeaderFromAdvancedExpression() {
    isSyncingHeader = true;
    table.clearHeaderFilter();
    var map = expressionToHeaderValueMap(activeAdvancedExpression);
    Object.keys(map).forEach(function(field) {
      table.setHeaderFilterValue(field, map[field]);
    });
    isSyncingHeader = false;
  }

  function renderQuickFilterMirror() {
    var filters = table.getHeaderFilters();
    if (!filters.length) {
      quickMirrorNode.innerHTML = '<p class="filter-empty">No header filters set</p>';
      return;
    }
    quickMirrorNode.innerHTML = "";
    filters.forEach(function(filter) {
      var chip = document.createElement("span");
      chip.className = "quick-chip";
      chip.textContent = filter.field + ": " + filter.value;
      quickMirrorNode.appendChild(chip);
    });
  }

  function updateFilterSummary() {
    var merged = mergeExpressions(activeAdvancedExpression, headerFiltersToExpression());
    quickSummaryNode.textContent = expressionToText(merged);
    renderQuickFilterMirror();
  }

  function buildColumnsPanel() {
    columnsPanelList.innerHTML = "";
    table.getColumns().forEach(function(col) {
      var def = col.getDefinition();
      var label = document.createElement("label");
      label.className = "columns-panel-item";
      var cb = document.createElement("input");
      cb.type = "checkbox";
      cb.checked = col.isVisible();
      cb.addEventListener("change", function() { col.toggle(); });
      label.appendChild(cb);
      label.appendChild(document.createTextNode(def.title || def.field));
      columnsPanelList.appendChild(label);
    });
  }

  openColumnsPanelBtn.addEventListener("click", function() { buildColumnsPanel(); openPanel("columns-side-panel"); });
  openFiltersPanelBtn.addEventListener("click", function() { renderFilterBuilder(); renderQuickFilterMirror(); openPanel("filters-panel"); });
  panelBackdrop.addEventListener("click", closePanels);
  document.querySelectorAll("[data-close-panel]").forEach(function(btn) { btn.addEventListener("click", closePanels); });
  document.addEventListener("keydown", function(event) { if (event.key === "Escape") closePanels(); });

  rootGroupOp.addEventListener("change", function() { advancedState.op = rootGroupOp.value; normalizeGroupChildren(advancedState); renderFilterBuilder(); });
  document.getElementById("add-root-rule").addEventListener("click", function() {
    advancedState.children = advancedState.op === "not" ? [createRuleNode()] : advancedState.children.concat([createRuleNode()]);
    renderFilterBuilder();
  });
  document.getElementById("add-root-group").addEventListener("click", function() {
    advancedState.children = advancedState.op === "not" ? [createGroupNode()] : advancedState.children.concat([createGroupNode()]);
    renderFilterBuilder();
  });

  document.getElementById("clear-advanced-filter").addEventListener("click", function() {
    advancedState = { op: "and", children: [] };
    rootGroupOp.value = "and";
    activeAdvancedExpression = null;
    isSyncingHeader = true;
    table.clearHeaderFilter();
    isSyncingHeader = false;
    renderFilterBuilder();
    fetchJobs(null).then(updateFilterSummary);
  });

  document.getElementById("apply-advanced-filter").addEventListener("click", function() {
    activeAdvancedExpression = serializeNode(advancedState);
    syncHeaderFromAdvancedExpression();
    fetchJobs(activeAdvancedExpression)
      .then(updateFilterSummary)
      .catch(function(err) { window.alert(err.message); });
  });

  table.on("dataFiltered", function() {
    if (isSyncingHeader) {
      updateFilterSummary();
      return;
    }
    updateFilterSummary();
  });

  renderFilterBuilder();
  fetchJobs(null).then(updateFilterSummary);
})();
</script>
{% endblock %}
