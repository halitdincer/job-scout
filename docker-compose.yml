services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: jobscout
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/jobscout
      DEBUG: "True"
      SECRET_KEY: django-insecure-dev-only
      ALLOWED_HOSTS: localhost,127.0.0.1
    depends_on:
      - db

volumes:
  pgdata:
