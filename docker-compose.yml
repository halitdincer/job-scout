services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: jobscout
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  web:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: jdbc:postgresql://db:5432/jobscout
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
    depends_on:
      - db

volumes:
  pgdata:
